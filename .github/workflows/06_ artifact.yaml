name: artifact

on: push

jobs:
  upload:
    name: Job 1
    runs-on: ubuntu-latest
    steps:
      - name: Checkout v6
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: build application
        run: npm run build
      - name: upload du build
        uses: actions/upload-artifact@v7
        with:
          name: mon_app
          path: dist

  download:
    runs-on: ubuntu-latest
    needs: upload
    steps:
      - name: download artifact
        uses: actions/download-artifact@v8
        with:
          name: mon_app
      - name: list files
        run: ls