name: deploy

on: push

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout v6
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: build application
        run: npm run build
 
      - name: run tests
        run: npm run test

  build-and-push:
    name: build_and_push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == "refs/heads/main" && github.event_name == "push"

    steps:
      - name: checkout_repository
        uses: actions/checkout@v6

      - name: login_docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: build_and_push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mon_app .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mon_app